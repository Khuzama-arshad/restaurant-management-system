{% extends "base.html" %}
{% load static %}

{% block contactform %}
<h1 class="text-white bg-black font-regular-lg text-4xl uppercase text-center pt-9">Login Here</h1>
<form method="POST" class="max-w-md mx-auto bg-[#161616] border border-white/10 rounded-2xl p-8 shadow-2xl space-y-5">
    {% csrf_token %}

    <div>
        <label class="block text-sm font-medium text-gray-300 mb-1.5">Username</label>
        <input type="text" name="username" placeholder="Enter username"
            class="w-full bg-[#1b1b1b] border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-500
                   focus:outline-none focus:ring-2 focus:ring-[#a24a09] focus:border-transparent
                   transition-all duration-200">
    </div>

    <div>
        <label class="block text-sm font-medium text-gray-300 mb-1.5">Password</label>
        <input type="password" name="password" placeholder="Enter password"
            class="w-full bg-[#1b1b1b] border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-500
                   focus:outline-none focus:ring-2 focus:ring-[#a24a09] focus:border-transparent
                   transition-all duration-200">
    </div>
    <button type="submit"
        class="w-full py-3.5 rounded-full bg-gradient-to-r from-[#883b04] to-[#a24a09] text-white font-bold
               hover:shadow-lg hover:shadow-[#883b04]/30 hover:scale-[1.02] active:scale-[0.98]
               transition-all duration-300">
        Login
    </button>
     <a href="/signup/" class="text-white underline text-center block pt-4">Don't have an account? Sign Up</a>
</form>

{% endblock  %}
